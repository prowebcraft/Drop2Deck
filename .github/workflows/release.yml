name: Release binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  native-build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            gluon_target: windows
            gradle_property: GRAALVM_WINDOWS_HOME
            executable: DeckDrop.exe
            asset_name: Drop2Deck-windows-x64.exe
            native_image_musl: "false"
          - name: Linux x64
            runner: ubuntu-latest
            gluon_target: linux
            gradle_property: GRAALVM_LINUX_HOME
            executable: DeckDrop
            asset_name: Drop2Deck-linux-x64
            native_image_musl: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "17"
          components: native-image
          cache: gradle
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl: ${{ matrix.native_image_musl }}

      - name: Set up MSVC build environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Linux native-image prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev

      - name: Configure GraalVM paths
        shell: bash
        run: |
          java_home="$JAVA_HOME"
          if command -v cygpath >/dev/null 2>&1; then
            java_home="$(cygpath -m "$JAVA_HOME")"
          fi

          {
            echo "GRAALVM_WINDOWS_HOME ="
            echo "GRAALVM_LINUX_HOME ="
            echo "GRAALVM_MACOSX_HOME ="
            echo "${{ matrix.gradle_property }} = $java_home"
          } > gradle.properties

      - name: Build native binary
        shell: bash
        env:
          USE_NATIVE_IMAGE_JAVA_PLATFORM_MODULE_SYSTEM: "false"
        run: bash ./gradlew nativeBuild --no-daemon --stacktrace

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp "build/gluonfx/x86_64-${{ matrix.gluon_target }}/${{ matrix.executable }}" "dist/${{ matrix.asset_name }}"
          if [ "${{ runner.os }}" = "Linux" ]; then
            chmod +x "dist/${{ matrix.asset_name }}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
